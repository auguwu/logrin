name: "Linux / CI"
on:
    workflow_dispatch: {}
    push:
        branches:
            - 'issues/gh-**'
            - 'feat/**'
            - master

        paths-ignore:
            - '.github/**'
            - '.vscode/**'
            - 'hack/**'
            - '.ci/**'
            - 'nix/**'

            - 'tools/bazeldist'
            - 'tools/hotpatch-release.py'

            - CHANGELOG.md
            - renovate.json
            - flake.lock
            - .*ignore
            - .clangd
            - .envrc
    pull_request:
        types: [opened, synchronize]
        branches:
            - 'issues/gh-**'
            - 'noel/**'
            - 'feat/**'
            - master
        paths:
            - '**'
permissions:
    contents: read
    checks: write
concurrency:
    group: ${{github.workflow}}-${{github.ref}}
    cancel-in-progress: true
jobs:
    bazel:
        name: "Bazel ${{matrix.bazel}} / C++${{matrix.cxx-standard}} [compiler=${{matrix.compiler}} exceptions=${{matrix.exceptions}} rtti=${{matrix.rtti}}]"
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/noelware/violet/ci:${{matrix.compiler}}
        strategy:
            fail-fast: false
            matrix:
                exceptions: ["true", "false"]
                rtti: ["true", "false"]
                compiler:
                    - gcc-15
                    - gcc-14
                    - clang-22
                    - clang-21
                    - clang-20
                bazel:
                    - "7.7.1"
                    - "8.6.0"
                    # - "9.0.1"
                cxx-standard:
                    - "20"
                    - "23"
                    - "26"
                include:
                    - compiler: clang-22
                      flags: ""
                      cxx: clang++-22
                      cc: clang-22
                    - compiler: clang-21
                      flags: ""
                      cxx: clang++-21
                      cc: clang-21
                    - compiler: clang-20
                      flags: ""
                      cxx: clang++-20
                      cc: clang-20
                    - compiler: gcc-15
                      flags: ""
                      cxx: g++
                      cc: gcc
                    - compiler: clang-14
                      flags: ""
                      cxx: g++
                      cc: gcc
        env:
            BAZELFLAGS: "--config=ci --config=cxx${{matrix.cxx-standard}} --action_env=CC=${{matrix.cc}} --action_env=CXX=${{matrix.cxx}} ${{matrix.flags}}"
        steps:
            - uses: actions/checkout@v6
            - run: echo "USE_BAZEL_VERSION=${{matrix.bazel}}" >> .bazelversion
            - uses: bazel-contrib/setup-bazel@0.19.0
              with:
                bazelisk-cache: true # avoid installing Bazel each time
                repository-cache: true # cache repositories in `MODULE.bazel`
                disk-cache: ${{github.workflow}}

            - run: bazel build //... ${{env.BAZELFLAGS}}
            - run: bazel test //... ${{env.BAZELFLAGS}}

